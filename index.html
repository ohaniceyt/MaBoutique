<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaBoutique Ultra v7 🇹🇬</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .tab-active { background: white; color: #15803d; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-44">

    <nav class="bg-green-700 text-white p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center text-left">
        <div onclick="app.ui.openShopMenu()" class="flex items-center gap-3 cursor-pointer active:opacity-70">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl shadow-inner">🏪</div>
            <div>
                <h1 id="nav-shop-name" class="font-extrabold text-lg leading-tight italic">MaBoutique</h1>
                <p id="nav-user-name" class="text-[10px] opacity-70 font-bold uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="app.ui.startScan('vente')" class="bg-white/20 p-3 rounded-full text-xl active:bg-white/40">💰</button>
        </div>
    </nav>

    <div class="p-4 sticky top-[72px] z-40 bg-gray-50/90 backdrop-blur-md">
        <div class="bg-gray-200/50 p-1 rounded-2xl flex text-[9px] font-black uppercase">
            <button onclick="app.ui.switchTab('stock')" id="btn-stock" class="flex-1 py-3 rounded-xl tab-active">📦 Stock</button>
            <button onclick="app.ui.switchTab('dettes')" id="btn-dettes" class="flex-1 py-3 rounded-xl text-gray-500">💳 Dettes</button>
            <button onclick="app.ui.switchTab('rapport')" id="btn-rapport" class="flex-1 py-3 rounded-xl text-gray-500">📊 Bilan</button>
        </div>
    </div>

    <main class="px-4 max-w-md mx-auto">
        <div id="view-stock" class="app-view space-y-4">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex gap-2 items-center">
                <input type="text" id="stock-search" oninput="app.ui.filterStock()" placeholder="Chercher nom ou code ID..." class="flex-1 p-2 outline-none text-sm font-semibold bg-transparent">
                <button onclick="app.ui.startScan('update')" class="bg-green-700 text-white p-2.5 rounded-xl text-lg active:scale-90 transition-transform">📷</button>
            </div>
            <div id="inventory-list" class="space-y-3"></div>
        </div>

        <div id="view-dettes" class="app-view hidden space-y-3"></div>

        <div id="view-rapport" class="app-view hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xl">Bilan du Jour</h3>
                    <button onclick="app.logic.shareReport()" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase">WhatsApp 📲</button>
                </div>
                <div id="rep-log" class="space-y-2 mb-6"></div>
                <button onclick="app.logic.clearReport()" class="w-full text-[10px] font-bold text-red-300 uppercase py-2">Clôturer la journée</button>
            </div>
        </div>
    </main>

    <div id="modal-scan" class="modal items-center justify-center p-4">
        <div class="bg-white p-4 rounded-3xl w-full max-w-sm">
            <div id="reader" class="rounded-2xl overflow-hidden"></div>
            <button onclick="app.ui.stopScan()" class="w-full bg-red-50 text-red-500 py-4 mt-4 rounded-2xl font-black">ANNULER LE SCAN</button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6 flex flex-wrap gap-3 z-50">
        <button onclick="app.ui.addProduct()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">+ PRODUIT</button>
        <button onclick="app.ui.addDebt()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">+ DETTE</button>
        <button onclick="app.ui.addExpense()" class="w-full bg-red-500 text-white py-4 rounded-2xl font-black shadow-lg text-xs italic">SORTE DE CAISSE (DÉPENSE)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
