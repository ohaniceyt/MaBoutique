<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaBoutique Ultra Togo 🇹🇬</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(10px); }
        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .tab-active { background: white; color: #15803d; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-32">

    <nav class="bg-green-700 text-white p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div onclick="app.ui.openShopMenu()" class="flex items-center gap-3 cursor-pointer active:scale-95 transition-all">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl shadow-inner">🏪</div>
            <div class="text-left">
                <h1 id="nav-shop-name" class="font-extrabold text-lg leading-tight">Chargement...</h1>
                <p id="nav-user-name" class="text-[10px] opacity-70 font-bold uppercase tracking-widest"></p>
            </div>
        </div>
        <button onclick="app.ui.startScan()" class="bg-white/20 p-3 rounded-full text-xl">📷</button>
    </nav>

    <div class="p-4 sticky top-[72px] z-40 bg-gray-50/90 backdrop-blur-md">
        <div class="bg-gray-200/50 p-1 rounded-2xl flex text-[9px] font-extrabold uppercase tracking-tight">
            <button onclick="app.ui.switchTab('stock')" id="btn-stock" class="flex-1 py-3 rounded-xl transition-all tab-active">📦 Stock</button>
            <button onclick="app.ui.switchTab('dettes')" id="btn-dettes" class="flex-1 py-3 rounded-xl transition-all text-gray-500">💳 Dettes</button>
            <button onclick="app.ui.switchTab('rapport')" id="btn-rapport" class="flex-1 py-3 rounded-xl transition-all text-gray-500">📊 Bilan</button>
        </div>
    </div>

    <div id="modal-scan" class="modal items-center justify-center p-4">
        <div class="bg-white p-4 rounded-3xl w-full max-w-sm">
            <div id="reader" style="width: 100%;"></div>
            <button onclick="app.ui.stopScan()" class="w-full bg-red-50 text-red-500 py-3 mt-4 rounded-xl font-bold">Arrêter</button>
        </div>
    </div>

    <main class="px-4 max-w-md mx-auto">
        <div id="view-stock" class="app-view space-y-3"></div>
        <div id="view-dettes" class="app-view hidden space-y-3"></div>
        
        <div id="view-rapport" class="app-view hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-6 border border-white">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-extrabold text-xl">Rapport Financier</h3>
                    <button onclick="app.logic.shareReport()" class="bg-green-100 text-green-700 px-3 py-1.5 rounded-xl text-xs font-bold">Partager WhatsApp 📲</button>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-green-50 p-4 rounded-2xl"><p class="text-[9px] font-bold text-green-600 uppercase mb-1">Entrées</p><p id="rep-in" class="text-lg font-black text-green-800">0</p></div>
                    <div class="bg-red-50 p-4 rounded-2xl"><p class="text-[9px] font-bold text-red-600 uppercase mb-1">Dépenses</p><p id="rep-out" class="text-lg font-black text-red-800">0</p></div>
                </div>

                <div class="bg-gray-900 p-5 rounded-3xl mb-8 text-center shadow-xl">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Bénéfice Net Estimé</p>
                    <p id="rep-gain" class="text-3xl font-black text-green-400">0 CFA</p>
                </div>

                <div id="rep-log" class="space-y-2"></div>
                <button onclick="app.logic.clearReport()" class="w-full mt-10 text-[10px] font-bold text-red-300 uppercase">Réinitialiser la journée</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6 flex flex-wrap gap-2 z-50">
        <button onclick="app.ui.addProduct()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">+ Produit</button>
        <button onclick="app.ui.addDebt()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">+ Dette</button>
        <button onclick="app.ui.addExpense()" class="w-full bg-red-500 text-white py-3 rounded-2xl font-extrabold shadow-lg">Sortie de Caisse (Dépense)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
