<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaBoutique Pro Togo 🇹🇬</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15803d">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .tab-active { background: white; color: #15803d; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-28">

    <div id="modal-shops" class="modal items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white p-6 rounded-t-[2.5rem] sm:rounded-3xl w-full max-w-md shadow-2xl text-center">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 class="text-2xl font-extrabold mb-6">Mes Boutiques</h3>
            <div id="shop-list-container" class="space-y-3 mb-6 max-h-80 overflow-y-auto hide-scroll p-1"></div>
            <button onclick="app.ui.promptNewShop()" class="w-full bg-green-50 text-green-700 border-2 border-dashed border-green-200 py-4 rounded-2xl font-bold mb-4">+ Créer une boutique</button>
            <button onclick="app.ui.closeModals()" class="w-full bg-gray-100 py-4 rounded-2xl font-extrabold text-gray-600">Fermer</button>
        </div>
    </div>

    <div id="onboarding" class="modal items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center">
            <div class="text-5xl mb-4 text-green-600">🇹🇬</div>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Bienvenue !</h2>
            <p class="text-sm text-gray-500 mb-8">Gérez votre stock et vos dettes facilement.</p>
            <input type="text" id="ob-name" placeholder="Votre Nom" class="w-full p-4 bg-gray-100 border-none rounded-2xl mb-4 outline-none">
            <input type="text" id="ob-shop" placeholder="Nom de la boutique" class="w-full p-4 bg-gray-100 border-none rounded-2xl mb-8 outline-none">
            <button onclick="app.finishOnboarding()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-extrabold text-lg">Commencer</button>
        </div>
    </div>

    <nav class="bg-green-700 text-white p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div onclick="app.ui.openShopMenu()" class="flex items-center gap-3 cursor-pointer">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🏪</div>
            <div class="text-left">
                <h1 id="nav-shop-name" class="font-extrabold text-lg leading-tight">...</h1>
                <p id="nav-user-name" class="text-[10px] opacity-70 font-bold uppercase tracking-widest"></p>
            </div>
        </div>
        <div id="status-dot" class="w-3 h-3 bg-green-400 rounded-full border-2 border-white"></div>
    </nav>

    <div class="p-4 sticky top-[72px] z-40 bg-gray-50/90 backdrop-blur-md">
        <div class="bg-gray-200/50 p-1 rounded-2xl flex text-[10px] font-extrabold uppercase">
            <button onclick="app.ui.switchTab('stock')" id="btn-stock" class="flex-1 py-3 rounded-xl transition-all tab-active">📦 Stock</button>
            <button onclick="app.ui.switchTab('dettes')" id="btn-dettes" class="flex-1 py-3 rounded-xl transition-all text-gray-500">💳 Dettes</button>
            <button onclick="app.ui.switchTab('rapport')" id="btn-rapport" class="flex-1 py-3 rounded-xl transition-all text-gray-500">📊 Rapport</button>
            <button onclick="app.ui.switchTab('team')" id="btn-team" class="flex-1 py-3 rounded-xl transition-all text-gray-500">👥 Équipe</button>
        </div>
    </div>

    <main class="px-4 max-w-md mx-auto">
        <div id="view-stock" class="app-view space-y-3"></div>
        <div id="view-dettes" class="app-view hidden space-y-3"></div>
        <div id="view-rapport" class="app-view hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-extrabold text-2xl text-gray-800">Bilan du Jour</h3>
                    <button onclick="app.logic.clearReport()" class="text-red-500 text-xl">🗑️</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8 text-left">
                    <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                        <p class="text-[9px] font-black text-green-600 uppercase mb-1">Ventes Directes</p>
                        <p id="rep-sales" class="text-lg font-extrabold text-green-900">0</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-1">Total Acomptes</p>
                        <p id="rep-cash" class="text-lg font-extrabold text-blue-900">0</p>
                    </div>
                </div>
                <div id="rep-log" class="space-y-3"></div>
            </div>
        </div>
        <div id="view-team" class="app-view hidden">
            <div id="team-list" class="bg-white p-6 rounded-[2rem] shadow-sm space-y-3"></div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6 flex gap-4 z-50">
        <button onclick="app.ui.addProduct()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-extrabold">+ Produit</button>
        <button onclick="app.ui.addDebt()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-extrabold">+ Dette</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
